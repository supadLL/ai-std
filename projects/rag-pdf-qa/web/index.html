<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Knowledge RAG Agent</title>
    <link rel="stylesheet" href="/web/styles.css?v=25" />
  </head>
  <body>
    <main class="shell">
      <aside class="panel nav-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Local RAG</p>
            <h1>Local Knowledge RAG Agent</h1>
          </div>
        </div>

        <nav class="tab-nav" aria-label="主功能" role="tablist">
          <button class="tab-button active" type="button" data-tab="import" role="tab" aria-selected="true">
            <span>
              <b>文件导入</b>
              <small>Import</small>
            </span>
          </button>
          <button class="tab-button" type="button" data-tab="ask" role="tab" aria-selected="false">
            <span>
              <b>知识问答</b>
              <small>Ask</small>
            </span>
          </button>
          <button class="tab-button" type="button" data-tab="settings" role="tab" aria-selected="false">
            <span>
              <b>设置</b>
              <small>Settings</small>
            </span>
          </button>
        </nav>

        <a class="ghost-link docs-link" href="/docs" target="_blank" rel="noreferrer">Swagger Docs</a>
      </aside>

      <section class="workspace">
        <section class="tab-page active" id="tab-import" role="tabpanel">
          <div class="panel import-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Import</p>
                <h2>文件导入</h2>
              </div>
              <button class="icon-button" id="refreshDocuments" title="刷新文档列表">↻</button>
            </div>

            <form class="upload-box" id="uploadForm">
              <input id="fileInput" name="file" type="file" accept=".pdf,.md,.markdown,.txt,.docx,.csv,.xlsx" />
              <div class="upload-meta">
                <label for="chunkSize">chunk</label>
                <input id="chunkSize" name="chunk_size" type="number" min="100" max="3000" value="800" />
                <label for="overlap">overlap</label>
                <input id="overlap" name="overlap" type="number" min="0" value="100" />
              </div>
              <label class="toggle">
                <input id="reindex" name="reindex" type="checkbox" />
                <span>reindex</span>
              </label>
              <button class="primary-button" type="submit">上传索引</button>
            </form>

            <div class="document-list" id="documentList"></div>
          </div>
        </section>

        <section class="tab-page ask-layout" id="tab-ask" role="tabpanel" hidden>
          <section class="panel answer-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Retrieve</p>
                <h2>知识问答</h2>
              </div>
              <span class="status-pill" id="statusPill">idle</span>
            </div>

            <div class="answer-output chat-thread" id="answerOutput">
              <p class="empty-state">等待问题</p>
            </div>

            <form class="ask-bar" id="askForm">
              <textarea id="questionInput" rows="2" placeholder="输入问题"></textarea>
              <div class="controls">
                <label>
                  top_k
                  <input id="topK" type="number" min="1" max="10" value="5" />
                </label>
                <label>
                  threshold
                  <input id="scoreThreshold" type="number" min="0" max="1" step="0.05" placeholder="auto" />
                </label>
                <button class="primary-button ask-button" type="submit">提问</button>
              </div>
            </form>
          </section>

          <aside class="panel sources-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Sources</p>
                <h2>检索来源</h2>
              </div>
            </div>
            <div class="debug-grid" id="debugGrid"></div>
            <div class="source-list" id="sourceList"></div>
          </aside>
        </section>

        <section class="tab-page" id="tab-settings" role="tabpanel" hidden>
          <div class="panel settings-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Settings</p>
                <h2>模型与提示词</h2>
              </div>
              <span class="status-pill" id="settingsStatus">local</span>
            </div>

            <form class="settings-form" id="settingsForm">
              <div class="settings-grid">
                <label>
                  API Base URL
                  <input id="baseUrlInput" type="url" placeholder="https://api.deepseek.com" />
                </label>
                <label>
                  LLM Model
                  <input id="modelInput" type="text" placeholder="deepseek-v4-flash" />
                </label>
                <label>
                  API Key
                  <input id="apiKeyInput" type="password" placeholder="留空则不修改已配置密钥" autocomplete="off" />
                </label>
                <label>
                  Timeout
                  <input id="timeoutInput" type="number" min="1" max="300" step="1" />
                </label>
              </div>

              <label class="toggle">
                <input id="clearApiKeyInput" type="checkbox" />
                <span>清除本地运行时 API Key</span>
              </label>

              <label>
                RAG System Prompt
                <textarea id="systemPromptInput" rows="7"></textarea>
              </label>
              <label>
                RAG Answer Instructions
                <textarea id="answerPromptInput" rows="10"></textarea>
              </label>

              <div class="settings-actions">
                <button class="primary-button" type="submit">保存设置</button>
                <button class="ghost-button" id="reloadSettings" type="button">重新读取</button>
              </div>
            </form>
          </div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast"></div>
    <script src="/web/app.js?v=25"></script>
  </body>
</html>
